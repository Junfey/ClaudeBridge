<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0b0d10">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ClaudeBridge</title>
<style>
  :root {
    --bg:#0b0d10; --panel:#14181d; --line:#232830; --fg:#e6e8eb;
    --muted:#8a8f96; --accent:#d97757; --user:#2a3340;
    --ok:#2ea043; --warn:#d9a441; --err:#ff7b72; --tool:#5b8def;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none; max-width:100%; overflow-x:hidden; height:100%;
    touch-action:pan-x pan-y;   /* no pinch-zoom / double-tap-zoom of the page */
    -webkit-text-size-adjust:100%; }
  /* 100dvh accounts for the mobile address bar so the footer never slips below
     the visible area (100vh would push it off-screen). */
  /* The body itself must NEVER scroll or shift — only <main> scrolls vertically.
     Locking both axes here kills the "whole page slides / has H+V scrollbars"
     regression when a chat message is wider than the viewport. */
  /* --app-h is set from the VisualViewport height when the on-screen keyboard
     opens (see script) so the app clamps to the VISIBLE area and the header never
     gets pushed off the top. Falls back to 100dvh (which interactive-widget=
     resizes-content already shrinks on Chrome/Android). */
  body { display:flex; flex-direction:column; height:100vh; height:100dvh;
    height:var(--app-h, 100dvh); width:100%; overflow:hidden; }
  header { padding:12px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; background:var(--panel); }
  header .back { background:none; border:none; color:var(--accent); font-size:22px; cursor:pointer; padding:0 4px; display:none; }
  header h1 { font-size:16px; margin:0; flex:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .status { font-size:12px; color:var(--muted); white-space:nowrap; }
  header .status.online { color:var(--ok); }
  header .status.offline { color:var(--err); }
  header .ctx { font-size:11px; color:var(--muted); white-space:nowrap; }
  header .hbtn { background:none; border:1px solid var(--line); color:var(--fg); border-radius:8px;
    width:30px; height:30px; font-size:18px; cursor:pointer; padding:0; }
  main { flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; width:100%; }
  .section-label { padding:12px 14px 6px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .proj-head { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer;
    background:var(--panel); border-bottom:1px solid var(--line); border-top:1px solid var(--line); }
  .proj-head:active { background:var(--bg); }
  .proj-head .chev { color:var(--accent); font-size:13px; width:14px; transition:transform .15s; }
  .proj-head .proj-name { flex:1; font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .proj-head .proj-count { font-size:12px; color:var(--muted); background:var(--bg); border-radius:10px; padding:2px 9px; }
  .new-tab { padding:11px 14px 11px 34px; color:var(--accent); font-weight:600; font-size:14px; cursor:pointer;
    border-bottom:1px solid var(--line); }
  .new-tab:active { background:var(--panel); }
  .new-tab.busy { color:var(--muted); pointer-events:none; }
  .spin { display:inline-block; width:13px; height:13px; border:2px solid currentColor;
    border-top-color:transparent; border-radius:50%; animation:rot .7s linear infinite; vertical-align:-2px; margin-left:8px; }
  @keyframes rot { to { transform:rotate(360deg); } }
  .card.in-proj { padding-left:34px; }
  .card { padding:14px; border-bottom:1px solid var(--line); cursor:pointer; position:relative; }
  .card:active { background:var(--panel); }
  .card.active-chat { background:rgba(217,119,87,.08); }
  .card.active-chat::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); }
  .card.is-done { background:rgba(217,164,65,.10); }
  .card.is-done::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--warn); }
  .done-badge { color:var(--warn); font-size:12px; font-weight:600; margin-left:8px; white-space:nowrap; }
  .card.is-working { background:rgba(217,119,87,.10); }
  .card.is-working::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); }
  .work-badge { color:var(--accent); font-size:12px; font-weight:600; margin-left:8px; white-space:nowrap; }
  .card.is-pending { background:rgba(91,141,239,.13); }
  .card.is-pending::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--tool); }
  .pending-badge { color:var(--tool); font-size:12px; font-weight:600; margin-left:8px; white-space:nowrap; }
  .spin-dot { animation:pulse 1s infinite; }
  .done-count { font-size:11px; color:#0b0d10; background:var(--warn); border-radius:10px; padding:2px 8px; font-weight:600; white-space:nowrap; }
  .pending-count { font-size:11px; color:#fff; background:var(--tool); border-radius:10px; padding:2px 8px; font-weight:600; white-space:nowrap; }
  .card .name { overflow-wrap:anywhere; }
  .card .name { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .card .meta { color:var(--muted); font-size:13px; margin-top:4px; word-break:break-all; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--ok); display:inline-block; flex:none; }
  .session-row { padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .session-row:active { background:var(--panel); }
  .session-row .title { font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-row .meta { color:var(--muted); font-size:12px; margin-top:3px; }
  .new-btn { padding:14px; color:var(--accent); cursor:pointer; font-weight:600; border-bottom:1px solid var(--line); }
  .chat { padding:12px; display:flex; flex-direction:column; gap:10px; max-width:100%; min-width:0; width:100%; }
  /* min-width:0 lets flex items shrink below content width so a wide child
     (code block, long path) scrolls inside itself instead of stretching the page. */
  .msg { padding:10px 12px; border-radius:10px; white-space:pre-wrap; word-wrap:break-word;
    overflow-wrap:anywhere; max-width:100%; min-width:0; }
  .msg.user { background:var(--user); align-self:flex-end; max-width:85%; }
  .msg.user.pending { opacity:.6; }
  .msg.user.pending::after { content:'⌛ отправляется…'; display:block; font-size:11px; color:var(--muted); margin-top:5px; }
  .msg.user.undelivered { opacity:.75; border:1px solid var(--warn); }
  .msg.user.undelivered::after { content:'⚠ нет связи — отправлю, как появится'; display:block; font-size:11px; color:var(--warn); margin-top:5px; }
  .msg.assistant { background:var(--panel); }
  .msg.md { white-space:normal; }
  .md-p { margin:0 0 8px; overflow-wrap:anywhere; word-break:break-word; } .md-p:last-child { margin-bottom:0; }
  .md-h { font-weight:700; margin:10px 0 6px; font-size:15px; overflow-wrap:anywhere; } .md-h:first-child { margin-top:0; }
  .md-li { margin:3px 0 3px 2px; padding-left:2px; overflow-wrap:anywhere; word-break:break-word; }
  .md-code { background:rgba(255,255,255,.09); padding:1px 5px; border-radius:4px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; overflow-wrap:anywhere; word-break:break-word; }
  .md-pre { background:rgba(0,0,0,.32); border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; overflow-x:auto; margin:8px 0; -webkit-overflow-scrolling:touch;
    max-width:100%; min-width:0; }
  .md-pre code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px;
    white-space:pre; color:var(--fg); }
  .md-hr { border:none; border-top:1px solid var(--line); margin:12px 0; }
  .md-p a, .md-li a { color:var(--tool); }
  /* GFM tables: a real grid. The wrap scrolls sideways when the table is wider
     than the chat, and a tap opens the fullscreen zoomable view (a squished
     table is unreadable on a phone). */
  .md-tablewrap { position:relative; margin:8px 0; border:1px solid var(--line); border-radius:8px;
    overflow-x:auto; -webkit-overflow-scrolling:touch; max-width:100%; cursor:pointer; }
  .md-table { border-collapse:collapse; font-size:13px; line-height:1.35; min-width:100%; }
  .md-table th, .md-table td { border:1px solid var(--line); padding:7px 10px; text-align:left;
    vertical-align:top; overflow-wrap:anywhere; word-break:break-word; }
  .md-table th { background:rgba(255,255,255,.05); font-weight:600; white-space:nowrap; }
  .md-table tbody tr:nth-child(even) td { background:rgba(255,255,255,.02); }
  .tbl-expand { position:absolute; top:5px; right:5px; z-index:2; pointer-events:none;
    background:rgba(20,24,29,.9); color:var(--accent); border:1px solid var(--line); border-radius:7px;
    font-size:10.5px; font-weight:600; padding:3px 7px; }
  /* fullscreen table viewer */
  #tblFs { position:fixed; inset:0; z-index:9999; background:var(--bg); display:none; flex-direction:column; }
  #tblFs.on { display:flex; }
  #tblFs .fsbar { display:flex; align-items:center; gap:8px; padding:12px 14px;
    border-bottom:1px solid var(--line); background:var(--panel); flex:none; }
  #tblFs .fsbar .ttl { flex:1; font-size:14px; font-weight:600; color:var(--muted); }
  #tblFs .fsbar button { background:none; border:1px solid var(--line); color:var(--fg); border-radius:8px;
    min-width:40px; height:36px; font-size:16px; font-weight:600; cursor:pointer; padding:0 10px; }
  #tblFs .fsbar button.x { color:var(--accent); }
  #tblFs .fsbody { flex:1; min-height:0; overflow:auto; -webkit-overflow-scrolling:touch; padding:14px; }
  #tblFs .fsbody table { border-collapse:collapse; font-size:var(--fsfs,15px); line-height:1.4; }
  #tblFs .fsbody th, #tblFs .fsbody td { border:1px solid var(--line); padding:9px 13px;
    text-align:left; vertical-align:top; }
  #tblFs .fsbody th { background:rgba(255,255,255,.06); font-weight:600; white-space:nowrap; }
  .msg.error { color:var(--err); }
  .tool { display:flex; align-items:center; gap:8px; font-size:12px; background:rgba(91,141,239,.12);
    color:var(--tool); padding:6px 10px; border-radius:8px; font-family:ui-monospace,monospace;
    overflow-wrap:anywhere; word-break:break-word; max-width:100%; }
  .toolout { font-size:11px; color:var(--muted); background:rgba(255,255,255,.03); padding:6px 10px;
    border-radius:6px; font-family:ui-monospace,monospace; white-space:pre-wrap; word-break:break-all;
    max-height:140px; overflow:hidden; border-left:2px solid var(--line); }
  .chat-loading { padding:34px 14px; color:var(--muted); text-align:center; display:flex;
    align-items:center; justify-content:center; gap:10px; font-size:14px; }
  .chat-loading .spin { width:18px; height:18px; margin:0; }
  .thinking { padding:8px 4px; color:var(--muted); font-style:italic; display:flex; align-items:center; gap:8px; }
  .thinking .dot { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  .icard { border:1px solid var(--accent); border-radius:12px; overflow:hidden; }
  .icard.perm { border-color:var(--err); }
  .icard.answering { opacity:.55; pointer-events:none; }
  .icard.answering::after { content:'отправляю ответ…'; display:block; padding:6px 11px 10px; color:var(--muted); font-size:12px; }
  .icard .ihead { padding:8px 11px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .icard .ihead.q { background:rgba(217,119,87,.15); color:var(--accent); }
  .icard .ihead.perm { background:rgba(255,123,114,.15); color:var(--err); }
  .icard .ibody { padding:10px 11px; font-size:13px; white-space:pre-wrap; }
  .icard .iopts { padding:0 11px 11px; display:flex; flex-direction:column; gap:7px; }
  .icard .iopt { border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:13px; cursor:pointer; }
  .icard .iopt:active { background:var(--panel); }
  .icard .iopt-label { font-weight:600; }
  .icard .iopt-desc { color:var(--muted); font-size:12px; margin-top:3px; line-height:1.35; }
  .icard .iopt-hint { padding:2px 11px 11px; color:var(--muted); font-size:12px; }
  .icard .iopt.allow { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; text-align:center; }
  .icard .iopt.deny { text-align:center; color:var(--muted); }
  footer { display:none; padding:8px; border-top:1px solid var(--line); background:var(--panel); flex-direction:column; gap:6px; }
  footer.visible { display:flex; }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  footer textarea { flex:1; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:10px;
    padding:10px; font:inherit; resize:none; min-height:44px; max-height:180px; overflow-y:auto; line-height:1.4; }
  footer #send { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:0 16px; font-weight:600; cursor:pointer; min-width:52px; height:44px; }
  footer #send:disabled { opacity:.5; cursor:not-allowed; }
  .iconbtn { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:10px;
    height:44px; min-width:44px; font-size:18px; cursor:pointer; padding:0; }
  .iconbtn.rec { background:var(--err); color:#fff; border-color:var(--err); animation:pulse 1s infinite; }
  #chips { display:flex; flex-wrap:wrap; gap:6px; }
  #chips:empty { display:none; }
  .chip { display:inline-flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--line);
    border-radius:8px; padding:5px 8px; font-size:12px; max-width:180px; }
  .chip span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chip b { color:var(--err); cursor:pointer; font-weight:700; }
  .chip img { width:28px; height:28px; object-fit:cover; border-radius:4px; cursor:pointer; }
  .msg-imgs { display:flex; flex-wrap:wrap; gap:6px; }
  .msg-imgs img { width:120px; height:120px; object-fit:cover; border-radius:8px; cursor:pointer; border:1px solid var(--line); }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.92); display:flex; align-items:center;
    justify-content:center; z-index:1000; }
  .lightbox img { max-width:96vw; max-height:92vh; object-fit:contain; }
  .lightbox .lb-close { position:fixed; top:14px; right:18px; color:#fff; font-size:34px; cursor:pointer; line-height:1; }
  .empty { padding:24px; color:var(--muted); text-align:center; }
  #limitbar { display:none; padding:6px 12px; font-size:12px; background:rgba(217,164,65,.15);
    color:var(--warn); text-align:center; border-bottom:1px solid var(--line); flex:none; }
  #limitbar.show { display:block; }
  #drawerBack { position:fixed; inset:0; background:#000; z-index:800; opacity:0; pointer-events:none;
    transition:opacity .24s ease; }
  #drawerBack.show { opacity:.45; pointer-events:auto; }
  #drawer { position:fixed; top:0; left:0; width:100%; height:100vh; height:100dvh; background:var(--bg);
    z-index:801; transform:translateX(-100%); box-shadow:2px 0 24px rgba(0,0,0,.6);
    display:flex; flex-direction:column; will-change:transform; }
  #drawer.open { transform:translateX(0); }
  #drawer.animate { transition:transform .24s cubic-bezier(.22,.61,.36,1); }
  .drawer-head { padding:14px; font-weight:600; font-size:15px; border-bottom:1px solid var(--line);
    background:var(--panel); display:flex; align-items:center; gap:8px; flex:none; }
  .drawer-body { flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:1100;
    display:flex; align-items:flex-end; animation:fade .12s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .menu-sheet { width:100%; background:var(--panel); border-top-left-radius:16px; border-top-right-radius:16px;
    padding:6px 0 max(8px,env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.5);
    animation:slideup .16s ease; }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .menu-title { padding:14px 18px 10px; font-size:13px; color:var(--muted); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; border-bottom:1px solid var(--line); }
  .menu-item { padding:15px 18px; font-size:16px; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .menu-item:active { background:var(--bg); }
  .menu-item.danger { color:var(--err); }
  .menu-item.cancel { color:var(--muted); justify-content:center; border-top:1px solid var(--line); margin-top:4px; font-weight:600; }
  .install-bar { position:fixed; left:8px; right:8px; bottom:calc(8px + env(safe-area-inset-bottom)); z-index:1200;
    background:var(--panel); border:1px solid var(--accent); border-radius:12px; padding:10px 12px;
    display:flex; align-items:center; gap:10px; box-shadow:0 6px 24px rgba(0,0,0,.5); font-size:14px; animation:slideup .2s ease; }
  .install-bar span { flex:1; }
  .install-bar button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:9px 13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .install-bar button.ib-x { background:transparent; color:var(--muted); padding:8px; font-size:18px; }
  .menu-item.sel { color:var(--accent); font-weight:600; }
  .menu-item.nohover:active { background:transparent; }
  .ctrl-state { color:var(--accent); font-weight:600; font-size:13px; margin-left:6px; }
  .eff-dots { display:flex; gap:10px; margin-top:8px; align-items:center; }
  .eff-dot { width:20px; height:20px; border-radius:50%; border:2px solid var(--line);
    background:var(--bg); cursor:pointer; flex:none; }
  .eff-dot.on { background:var(--accent); border-color:var(--accent); }
  .menu-item .mi-desc { color:var(--muted); font-size:12px; font-weight:400; margin-top:2px; }
  .menu-item .mi-wrap { display:flex; flex-direction:column; }
  .modebtn { background:var(--bg); border:1px solid var(--line); color:var(--fg); border-radius:8px;
    padding:5px 9px; font-size:12px; cursor:pointer; white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
  .modebtn:active { background:var(--panel); }
</style>
</head>
<body>
<header>
  <button class="back" id="back">←</button>
  <h1 id="title">ClaudeBridge</h1>
  <span class="ctx" id="ctx"></span>
  <button class="modebtn" id="modebtn" title="Режим" style="display:none">⚙ режим</button>
  <button class="hbtn" id="newsess" title="Новая сессия" style="display:none">＋</button>
  <span class="status" id="status">…</span>
</header>
<main id="main"></main>
<div id="limitbar"></div>
<div id="drawerBack"></div>
<aside id="drawer">
  <div class="drawer-head"><span>Вкладки Claude</span></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>
<footer id="footer">
  <div id="chips"></div>
  <div class="inputrow">
    <button id="attach" class="iconbtn" title="Прикрепить">📎</button>
    <textarea id="input" placeholder="Сообщение…" rows="1"></textarea>
    <button id="mic" class="iconbtn" title="Голос">🎤</button>
    <button id="send">▶</button>
  </div>
  <input type="file" id="fileInput" multiple hidden
         accept="image/*,.pdf,.txt,.md,.doc,.docx,.csv,.json,.js,.ts,.tsx,.py,.log">
</footer>

<script>
const $ = id => document.getElementById(id);
const main=$('main'), footer=$('footer'), titleEl=$('title'), statusEl=$('status'),
      backBtn=$('back'), input=$('input'), sendBtn=$('send'),
      ctxEl=$('ctx'), newsessBtn=$('newsess'), modeBtn=$('modebtn');
newsessBtn.onclick=()=>{
  if(S.ws && S.ws.readyState===1 && confirm('Начать новую сессию в этой вкладке?'))
    S.ws.send(JSON.stringify({type:'new_session'}));
};

let S = { view:'home', windows:[], cdpTabs:[], currentTitle:'', ws:null, key:'', activeTab:'' };

// Auth token: from ?key= (QR link) or saved; else prompt once.
// ?open=<target_id> (from a push tap) deep-links straight to that chat.
(function initKey(){
  const u = new URL(location.href);
  const fromUrl = u.searchParams.get('key');
  const openId = u.searchParams.get('open');
  if (openId) S.pendingOpen = openId;
  if (fromUrl) localStorage.setItem('bridgeKey', fromUrl);
  if (fromUrl || openId) { u.searchParams.delete('key'); u.searchParams.delete('open'); history.replaceState(null,'',u.toString()); }
  S.key = localStorage.getItem('bridgeKey') || '';
  if (!S.key) {
    S.key = (prompt('Код доступа ClaudeBridge:') || '').trim();
    if (S.key) localStorage.setItem('bridgeKey', S.key);
  }
})();

let _reauthing = null;
async function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers, { 'x-bridge-key': S.key });
  const r = await fetch(path, opts);
  if (r.status === 401) {
    // Self-heal: the saved key is stale/wrong. Ask once (shared across concurrent
    // 401s) for the current key from the ClaudeBridge window, then retry.
    localStorage.removeItem('bridgeKey');
    if (!_reauthing) {
      _reauthing = (async () => {
        statusEl.textContent = '● нужен ключ';
        statusEl.className = 'status offline';
        const k = (prompt('Ключ доступа не подошёл.\nВставь актуальный ключ из окна ClaudeBridge на ПК (или открой ссылку с ?key=…):') || '').trim();
        if (k) { S.key = k; localStorage.setItem('bridgeKey', k); cacheKeyForSW(); }
        return k;
      })();
    }
    const k = await _reauthing;
    _reauthing = null;
    if (k) return api(path, opts);   // retry with the new key
    throw new Error('unauthorized');
  }
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}
function wsKey(){ return S.key ? ('?key=' + encodeURIComponent(S.key)) : ''; }

async function loadHome() {
  if (S.loadingHome) return;   // a poll is still in flight — don't stack another
  S.loadingHome = true;        // (a slow /api/cdp/tabs must not pile up every 3s)
  try {
    const r = await api('/api/cdp/tabs');
    S.cdpTabs = (r && r.tabs) || [];
    S.cdpOk = r ? (r.cdp !== false) : true;
    setStatus(true);
    if (S.pendingOpen) {
      const t = S.cdpTabs.find(x => x.target_id === S.pendingOpen);
      S.pendingOpen = null;
      if (t) { openCdpTab(t); return; }
    }
    if (S.view === 'home') renderHome();
    else if (S.drawerOpen) renderDrawer();   // keep the open drawer fresh (done marks)
  } catch(e) { setStatus(false); }
  finally { S.loadingHome = false; }
}

let _offTimer=null, _wasOffline=false, _everOnline=false, _recoverTimer=null;
function localNotify(title, body, tag){
  try{
    if(('Notification' in window) && Notification.permission==='granted' && navigator.serviceWorker){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,{
        body, icon:'/static/icon-192.png', badge:'/static/icon-192.png', tag:tag||'cb-conn', renotify:true }));
    }
  }catch(e){}
}
function setStatus(on) {
  if (on) {
    if (_offTimer) { clearTimeout(_offTimer); _offTimer=null; }
    statusEl.textContent = '● online';
    statusEl.className = 'status online';
    _everOnline = true;
    // Defer the "restored" toast — if the link flaps (restore→drop within a few
    // seconds) don't spam it; only notify after staying online ~3s.
    if (_wasOffline && !_recoverTimer) {
      _recoverTimer = setTimeout(()=>{ _recoverTimer=null; _wasOffline=false;
        localNotify('ClaudeBridge','Связь с ПК восстановлена ✅'); }, 3000);
    }
  } else {
    if (_recoverTimer) { clearTimeout(_recoverTimer); _recoverTimer=null; }  // cancel pending "restored"
    // Debounce: brief WS reconnects / one flaky poll shouldn't blink the badge.
    // Only show offline after staying down ~4s.
    if (_offTimer || statusEl.className.indexOf('offline')>=0) return;
    _offTimer = setTimeout(() => {
      statusEl.textContent = '● offline';
      statusEl.className = 'status offline';
      _offTimer=null;
      if (_everOnline && !_wasOffline) { _wasOffline=true; localNotify('ClaudeBridge','ПК не в сети — связь потеряна'); }
    }, 4000);
  }
}

// Shared tabs-list rendering, used by both the full home screen and the drawer.
function tabsListHTML(){
  S.collapsed = S.collapsed || {};
  let html = '<div class="new-btn" data-openproj="1">📁 Открыть / создать проект</div>';
  if (S.cdpTabs.length) {
    const groups = {};
    S.cdpTabs.forEach((t,i) => { const w = t.window || 'VS Code'; (groups[w] = groups[w] || []).push(i); });
    for (const win of Object.keys(groups)) {
      const isCol = !!S.collapsed[win];
      const doneN = groups[win].filter(i => S.cdpTabs[i].done).length;
      const pendN = groups[win].filter(i => S.cdpTabs[i].pending).length;
      html += `<div class="proj-head" data-proj="${esc(win)}">
                 <span class="chev">${isCol?'▶':'▼'}</span>
                 <span class="proj-name">${esc(win)}</span>
                 ${pendN?`<span class="pending-count">${pendN} ❓</span>`:''}
                 ${doneN?`<span class="done-count">${doneN} готово</span>`:''}
                 <span class="proj-count">${groups[win].length}</span>
               </div>`;
      if (!isCol) {
        html += `<div class="new-tab" data-newtab="${esc(win)}">＋ Новая вкладка в проекте</div>`;
        html += groups[win].map(i => {
          const t = S.cdpTabs[i];
          const act = t.target_id===S.activeTab ? ' active-chat' : '';
          const state = t.pending ? ' is-pending' : (t.working ? ' is-working' : (t.done ? ' is-done' : ''));
          const dot = t.pending?'var(--tool)':(t.working?'var(--accent)':(t.done?'var(--warn)':(t.rendered?'var(--ok)':'var(--muted)')));
          const badge = t.pending ? '<span class="pending-badge">❓ ждёт ответа</span>'
                      : (t.working ? '<span class="work-badge">⟳ работает…</span>'
                      : (t.done ? '<span class="done-badge">● готово</span>' : ''));
          const meta = t.pending ? 'Claude задал вопрос — открой и ответь'
                     : (t.working ? 'Claude сейчас работает'
                     : (t.done ? 'Claude ответил — не прочитано'
                     : (t.rendered ? 'активна · пишешь напрямую' : 'спит · откроется при заходе')));
          return `<div class="card in-proj${act}${state}" data-cdp="${i}">
             <div class="name"><span class="live-dot${(t.working||t.pending)?' spin-dot':''}" style="background:${dot}"></span>${esc(t.title)}${badge}</div>
             <div class="meta">${meta}</div>
           </div>`;
        }).join('');
      }
    }
  } else if (S.cdpOk === false) {
    html += '<div class="section-label">Вкладки Claude в VS Code</div>';
    html += '<div class="empty">⚠ VS Code запущен без отладки — мост его не видит.<br><br>В окне <b>ClaudeBridge</b> на ПК нажми «VS Code без отладки — перезапустить», затем обнови эту страницу.</div>';
  } else {
    html += '<div class="section-label">Вкладки Claude в VS Code</div>';
    html += '<div class="empty">Открытых вкладок Claude не найдено.<br>Открой чат Claude в VS Code.</div>';
  }
  return html;
}

function wireTabsList(root){
  const rerender = () => { if(root===main && S.view==='home') renderHome(); else renderDrawer(); };
  root.querySelectorAll('[data-openproj]').forEach(el =>
    el.onclick = () => { closeDrawer(); openProjects(''); });
  root.querySelectorAll('[data-proj]').forEach(el =>
    el.onclick = () => { const w=el.dataset.proj; S.collapsed[w]=!S.collapsed[w]; rerender(); });
  root.querySelectorAll('[data-newtab]').forEach(el =>
    el.onclick = (e) => { e.stopPropagation(); newTabInProject(el.dataset.newtab, el); });
  root.querySelectorAll('[data-cdp]').forEach(el => {
    const tab = () => S.cdpTabs[+el.dataset.cdp];
    let lpTimer=null, lpFired=false;
    el.onclick = () => {
      if(lpFired){ lpFired=false; return; }
      if(Date.now()-(window.__swipeAt||0) < 400) return;  // a swipe, not a tap
      closeDrawer(); openCdpTab(tab());
    };
    el.oncontextmenu = (e) => { e.preventDefault(); showTabMenu(tab()); };
    el.addEventListener('touchstart', () => {
      lpFired=false;
      lpTimer=setTimeout(() => { lpFired=true; if(navigator.vibrate)navigator.vibrate(15); showTabMenu(tab()); }, 500);
    }, {passive:true});
    const cancel = () => { if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } };
    el.addEventListener('touchmove', cancel, {passive:true});
    el.addEventListener('touchend', cancel, {passive:true});
    el.addEventListener('touchcancel', cancel, {passive:true});
  });
}

function closeTabMenu(){ const m=$('tabmenu'); if(m) m.remove(); }
function showTabMenu(tab){
  if(!tab) return;
  closeTabMenu();
  const uid = tab.target_id;
  const ov = document.createElement('div');
  ov.className='menu-overlay'; ov.id='tabmenu';
  ov.innerHTML = `<div class="menu-sheet">
      <div class="menu-title">${esc(tab.title)}</div>
      <div class="menu-item" data-act="open">📂 Открыть</div>
      <div class="menu-item danger" data-act="close">✕ Закрыть вкладку</div>

      <div class="menu-item cancel" data-act="cancel">Отмена</div>
    </div>`;
  document.body.appendChild(ov);
  // The long-press that opened this menu emits a trailing "ghost" click on
  // release — which lands on the overlay (now under the finger). Ignore any
  // interaction for the first 450ms so the menu doesn't close/act on release.
  const openAt = Date.now();
  const fresh = () => Date.now() - openAt < 450;
  ov.addEventListener('click', (e) => { if(fresh()) return; if(e.target===ov) closeTabMenu(); });

    try{
      await api('/api/cdp/close-tab', { method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({ target_id: uid, others: act==='others' }) });
      setTimeout(loadHome, 700);
    }catch(e){ alert('Ошибка: '+e.message); }

function openCdpTab(tab) {

  backBtn.onclick = () => openDrawer();   // ← opens the tabs menu over the chat
  footer.classList.add('visible');

  // history can take several seconds, and a blank black screen looks broken.
  main.innerHTML = '<div class="chat" id="chat"><div class="chat-loading" id="chatloading"><span class="spin"></span>загружаю чат…</div></div>';
  _stick = true;   // a freshly opened chat follows new messages
  S.lastAction = '';

  S.cdpTarget = tab.target_id;
  S.card=null; S.cardKey='';     // reset any pending-question card from another chat
  S.activeTab = tab.target_id;   // persists after going back → shows the bar + enables forward-swipe
  // optimistically clear the "готово/unread" mark — the server confirms on next poll
  const tt = S.cdpTabs.find(x => x.target_id===tab.target_id); if(tt) tt.done=false;
  modeBtn.style.display='inline-block';
  modeBtn.textContent='⚙ …';
  modeBtn.onclick=()=>showModeSheet();
  // Defer the mode HTTP fetch so it doesn't compete with the history load for a
  // scarce tunnel connection during the critical open window (loca.lt gives only
  // ~2 concurrent connections). Mode rarely changes; a ~2s delay is invisible.
  clearTimeout(S.modeTimer);
  S.modeTimer=setTimeout(()=>{ if(S.view==='cdpchat' && S.cdpTarget===tab.target_id) loadMode(); }, 2000);
  S.loadTries=0; clearTimeout(S.loadWatch);   // reset the loader watchdog for a fresh open
  connectCdpWs();
}

// Russian name for an effort level (by VS Code's English label, else by index).
function effortRu(label, idx){
  const l=(label||'').toLowerCase();
  if(l.indexOf('low')===0) return 'Низкий';
  if(l.indexOf('medium')===0) return 'Средний';
  if(l.indexOf('extra')===0) return 'Очень высокий';
  if(l.indexOf('high')===0) return 'Высокий';
  if(l.indexOf('max')===0) return 'Максимальный';
  if(l.indexOf('ultra')===0) return 'Ультракод';
  return ['Низкий','Средний','Высокий','Очень высокий','Максимальный','Ультракод'][idx] || label || '';
}
function renderEffortDots(eff){
  const dd=$('effdots'); if(!dd) return;
  const cnt=eff.count||0, idx=(eff.index==null?-1:eff.index);
  const nm=$('effname'); if(nm) nm.textContent = (cnt && idx>=0) ? effortRu(eff.label, idx) : '';
  if(!cnt){ dd.innerHTML='<span class="mi-desc">недоступно</span>'; return; }
  dd.innerHTML=Array.from({length:cnt},(_,i)=>`<span class="eff-dot${i<=idx?' on':''}" data-eff="${i}"></span>`).join('');
  dd.querySelectorAll('[data-eff]').forEach(el=>el.onclick=async(e)=>{
    e.stopPropagation();
    const i=+el.dataset.eff;
    dd.querySelectorAll('.eff-dot').forEach((d,j)=>d.classList.toggle('on', j<=i));  // optimistic
    try{ const rr=await api('/api/cdp/effort',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({target_id:S.cdpTarget, index:i})}); renderEffortDots(rr); }catch(_){}
  });
}

  let data;
  try{ data=await api('/api/cdp/models?target_id='+encodeURIComponent(S.cdpTarget)); }
  catch(e){ sheet.innerHTML=`<div class="menu-title">Ошибка</div><div class="menu-item">${esc(e.message)}</div><div class="menu-item cancel" data-x="1">Закрыть</div>`; sheet.querySelector('[data-x]').onclick=()=>closeTabMenu(); return; }
  const cur=data.current||'';
  const rows=(data.options||[]).map(o=>{
    // options are {label, detail} — label = short name, detail = version + blurb
    const label=(o&&o.label!==undefined)?o.label:o;
    const detail=(o&&o.detail)?o.detail:'';
    const sel=label===cur?' sel':'';
    return `<div class="menu-item${sel}" data-model="${esc(label)}"><div class="mi-wrap"><div>${sel?'● ':''}${esc(label)}</div>${detail?`<div class="mi-desc">${esc(detail)}</div>`:''}</div></div>`;
  }).join('');
  sheet.innerHTML=`<div class="menu-title">Модель Claude${cur?' · сейчас '+esc(cur):''}</div>${rows}
    <div class="menu-item cancel" data-model="">Отмена</div>`;
  const openAt=Date.now(); const fresh=()=>Date.now()-openAt<300;
  sheet.querySelectorAll('[data-model]').forEach(it=>it.onclick=async()=>{
    if(fresh())return;
    const model=it.dataset.model; closeTabMenu();
    if(!model || model===cur) return;
    try{ const r=await api('/api/cdp/model',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({target_id:S.cdpTarget, model})});
      if(!r.ok) alert('Не удалось сменить модель');
    }catch(e){ alert('Ошибка: '+e.message); }
  });
}

// When the chat can't load after several reconnects (frames not routing through
// the tunnel), stop the silent spinner and give the user an explicit retry.
function showLoaderRetry(){
  const cl=$('chatloading'); if(!cl) return;
  cl.style.cursor='pointer';
  cl.textContent='⚠ чат не загрузился — нажми, чтобы повторить';
  cl.onclick=()=>{ cl.onclick=null; cl.style.cursor=''; cl.innerHTML='<span class="spin"></span>загружаю чат…'; S.loadTries=0; connectCdpWs(); };
}

function connectCdpWs() {
  closeWs();
  const chat = $('chat');
  if (!chat) return;
  const proto = location.protocol==='https:'?'wss':'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/cdp/${S.cdpTarget}${wsKey()}`);
  S.ws = ws;
  // Loader watchdog: if the first history frame never arrives — e.g. the tunnel
  // dropped it under connection starvation — the "загружаю чат…" spinner would
  // hang forever while the socket still looks "online". If the loader is still up
  // 14s after (re)connecting (longer than the server's 12s open timeout, so a
  // legitimately slow tab isn't cut off), force a reconnect; after a few tries,
  // show a tap-to-retry so the user is never stuck on a dead spinner.
  if ($('chatloading')) {
    clearTimeout(S.loadWatch);
    S.loadWatch = setTimeout(() => {
      if (!$('chatloading')) return;                         // history arrived → fine
      S.loadTries = (S.loadTries||0) + 1;
      if (S.loadTries < 3) { try{ ws.close(); }catch(e){} }  // onclose → reconnect
      else showLoaderRetry();
    }, 14000);
  }
  // Heartbeat: ping every 20s; if no pong within 15s the connection is half-dead,
  // so force-close it → onclose reconnects. 15s (not 8s) so a transient CPU/
  // network spike — e.g. a fullscreen game hogging the uplink / Windows Game Mode
  // throttling the PC — doesn't force a false drop. A visibilitychange re-check
  // still catches a truly dead socket instantly when you return to the app.
  let pongTimer=null;
  const stopHb=()=>{ if(S.hbTimer){clearInterval(S.hbTimer);S.hbTimer=null;} if(pongTimer){clearTimeout(pongTimer);pongTimer=null;} };
  ws.onopen = () => {
    setStatus(true);
    stopHb();
    flushOutbox();   // resend anything queued while we were disconnected
    resendPendingAnswer();  // a tapped answer that hadn't been confirmed yet
    // Reset the reconnect backoff once we've stayed open a few seconds (a stable
    // connection), so a one-off blip doesn't permanently slow future reconnects.
    setTimeout(()=>{ if(S.ws===ws && ws.readyState===1) S.reconnectDelay=800; }, 4000);
    S.hbTimer=setInterval(()=>{
      if(ws.readyState!==1) return;
      try{ ws.send(JSON.stringify({type:'ping'})); }catch(e){}
      if(!pongTimer) pongTimer=setTimeout(()=>{ try{ ws.close(); }catch(e){} }, 15000);
    }, 20000);
  };
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'pong') { if(pongTimer){clearTimeout(pongTimer);pongTimer=null;} return; }
    { const cl=$('chatloading'); if(cl){ cl.remove(); clearTimeout(S.loadWatch); S.loadTries=0; } }  // first real message → drop the loader + disarm watchdog
    if (m.type === 'history') {
      // Preserve the reader's position across the wipe+rebuild. History is re-sent
      // on every (re)connect / visibility re-check; if the user had scrolled up to
      // read, forcing to the bottom here yanked them down ("release → jumps to the
      // end"). Follow to the end ONLY if they were already at the bottom; otherwise
      // keep the same distance from the bottom (content is the same on a reconnect).
      const atBottom = _stick;
      const prevFromBottom = main.scrollHeight - main.scrollTop - main.clientHeight;
      chat.innerHTML = '';
      for (const msg of m.messages) {
        if (msg.role === 'tool') { const el=document.createElement('div'); el.className='tool'; el.textContent='🔧 '+msg.text; chat.appendChild(el); }
        else if (msg.role === 'toolout') addToolResult(chat, msg.text);
        else addMsg(chat, msg.role, msg.text);
      }
      renderOutboxPending(chat);  // show messages still queued for delivery
      if (S.card) addInteractive(chat, S.card);  // restore a still-pending question card
      if (atBottom) scrollDown(true);                     // was following → stay at the end
      else main.scrollTop = Math.max(0, main.scrollHeight - main.clientHeight - prevFromBottom);
    } else if (m.type === 'sent') {
      // Delivery confirmed → drop from the queue and clear the "pending" mark.
      if (m.cid) { outboxRemove(m.cid); markBubble(m.cid, 'ok'); }
    } else if (m.type === 'working') {
      // Persistent liveness: keep the indicator up while Claude works, drop it
      // when the turn ends — survives leaving/returning and reconnects.
      if (m.on) { if (S.view==='cdpchat' && !$('thinking')) addThinking(); }
      else removeThinking();
    } else if (m.type === 'thinking') {
      addThinking();
    } else if (m.type === 'assistant') {
      removeThinking();
      if (m.tools && m.tools.length){ for (const t of m.tools) addTool(chat, t); S.lastAction = toolLabel(m.tools[m.tools.length-1]); }
      if (m.text) addMsg(chat, 'assistant', m.text);
      if (S.view === 'cdpchat') addThinking();
    } else if (m.type === 'tool_result') {
      addToolResult(chat, m.text);
      S.lastAction = '';   // tool done → Claude thinks next
      if (S.view === 'cdpchat') addThinking();
    } else if (m.type === 'context') {
      ctxEl.textContent = `ctx ${m.pct}% · ${Math.round(m.tokens/1000)}k`;
    } else if (m.type === 'limit') {
      const lb=$('limitbar'); if(lb){ lb.textContent='⚠ '+m.text; lb.className='show'; }
    } else if (m.type === 'new_session_result') {
      // fresh chat started in VS Code — clear and reload
      chat.innerHTML=''; ctxEl.textContent=''; S.card=null; S.cardKey=''; removeInteractive();
    } else if (m.type === 'interactive') {
      // Singleton card: dedupe so re-sends (e.g. after a reconnect) don't blink
      // it, and remove it on an explicit null (question answered / gone).
      if (!m.data) { removeInteractive(); S.card=null; S.cardKey=''; }
      else {
        const key = cardKeyOf(m.data);
        if (!(S.cardKey===key && document.querySelector('.icard'))) {
          removeInteractive(); S.card=m.data; S.cardKey=key;
          removeThinking(); setSending(false); addInteractive(chat, m.data);
        }
      }
    } else if (m.type === 'answer_result') {
      // Confirm (or fail) a tapped answer. Only NOW do we drop the card — so an
      // answer lost in a drop keeps the card for a retry instead of vanishing.
      if (S.pendingAnswer && (!m.cid || m.cid===S.pendingAnswer.cid)) {
        S.pendingAnswer = null;
        if (m.ok) { S.card=null; S.cardKey=''; removeInteractive(); if(S.view==='cdpchat'){ removeThinking(); addThinking(); } }
        else { document.querySelectorAll('.icard.answering').forEach(e=>e.classList.remove('answering')); }
      }
    } else if (m.type === 'done') {
      removeThinking(); setSending(false); S.lastAction='';
    } else if (m.type === 'error') {
      removeThinking(); setSending(false);
      if (m.cid) markBubble(m.cid, 'undelivered');  // stays queued → retries on reconnect
      else addMsg(chat, 'error', '⚠ '+(m.text||''));
    }
  };
  ws.onclose = () => {
    stopHb();
    setSending(false); removeThinking();
    // Auto-reconnect while still on this chat, with exponential backoff + jitter
    // so a flapping tunnel doesn't storm the server with handshakes (which would
    // starve it further → worse flapping). Backoff resets after a stable open.
    if (S.view === 'cdpchat' && S.cdpTarget) {
      setStatus(false);
      const d = S.reconnectDelay || 800;
      S.reconnectDelay = Math.min(15000, d * 2);
      setTimeout(() => { if (S.view === 'cdpchat') connectCdpWs(); }, d + Math.random()*400);
    }
  };
}

function toolLabel(t){
  const name = t.name || 'tool';
  let detail = '';
  const inp = t.input || {};
  if (inp.file_path) detail = inp.file_path.split(/[\\/]/).pop();
  else if (inp.command) detail = inp.command.slice(0,44);
  else if (inp.path) detail = inp.path.split(/[\\/]/).pop();
  else if (inp.pattern) detail = inp.pattern.slice(0,44);
  else if (inp.url) detail = inp.url.replace(/^https?:\/\//,'').slice(0,44);
  else if (inp.query) detail = inp.query.slice(0,44);
  return `${iconFor(name)} ${name}${detail?' · '+detail:''}`;
}
function addTool(chat, t) {
  const el = document.createElement('div');
  el.className = 'tool';
  el.textContent = toolLabel(t);
  chat.appendChild(el); scrollDown();
}
function addToolResult(chat, text){
  if(!text) return;
  const el=document.createElement('div');
  el.className='toolout';
  const short = text.length>500 ? text.slice(0,500)+'…' : text;
  el.textContent=short;
  chat.appendChild(el); scrollDown();
}
function iconFor(name){ const n=name.toLowerCase();
  if(n.includes('read'))return '📖'; if(n.includes('edit')||n.includes('write'))return '✏️';
  if(n.includes('bash'))return '$'; if(n.includes('grep')||n.includes('glob'))return '🔍'; return '🔧'; }

// A stable identity for a card so re-sends can be deduped (no flicker).
function cardKeyOf(d){ if(!d) return '';
  return (d.title||'')+'|'+((d.options||[]).map(o=>o.label).join('~'))
    +'|'+((d.questions||[]).map(q=>q.question+':'+(q.options||[]).map(o=>o.label).join(',')).join('~')); }
function removeInteractive(){ document.querySelectorAll('.icard').forEach(e=>e.remove()); }
function resendPendingAnswer(){
  if(!S.pendingAnswer || !S.ws || S.ws.readyState!==1) return;
  const p=S.pendingAnswer;
  try{ S.ws.send(JSON.stringify({type:'answer', button:p.button, question:p.question, cid:p.cid})); }catch(e){}
}

function addInteractive(chat, data) {
  removeInteractive();  // never stack cards — one at a time
  const el = document.createElement('div');
  const perm = data.kind === 'permission';
  el.className = 'icard' + (perm?' perm':'');
  const send = (label, isQ) => {
    // Durable answer: keep the card (dimmed) until the SERVER confirms it via
    // answer_result. If the frame is lost in a drop, resendPendingAnswer() fires
    // it again on reconnect — the answer can't be silently lost.
    const cid = newCid();
    S.pendingAnswer = { cid, button: label, question: !!isQ };
    el.classList.add('answering');
    if (S.ws && S.ws.readyState===1) {
      try { S.ws.send(JSON.stringify({type:'answer', button:label, question:!!isQ, cid})); }catch(e){}
    } else {
      setStatus(false);
      if (S.view==='cdpchat' && S.cdpTarget) connectCdpWs();  // resends on open
    }
    // If not confirmed in 6s, un-dim so the user can re-tap (still resends on
    // reconnect meanwhile).
    setTimeout(()=>{ if(S.pendingAnswer && S.pendingAnswer.cid===cid)
      document.querySelectorAll('.icard.answering').forEach(e=>e.classList.remove('answering')); }, 6000);
  };
  // Clarifying question(s): render every question with all its options AND
  // descriptions (same as VS Code), plus a hint that you can type your own
  // answer in the message field below — the "свой вариант".
  if (data.questions && data.questions.length) {
    let html = `<div class="ihead q">❓ ${esc(data.title || 'Вопрос от Claude')}</div>`;
    for (const q of data.questions) {
      if (q.question && q.question !== data.title) html += `<div class="ibody">${esc(q.question)}</div>`;
      html += '<div class="iopts">';
      for (const o of (q.options||[])) {
        html += `<div class="iopt" data-btn="${esc(o.label)}">
                   <div class="iopt-label">${esc(o.label)}</div>
                   ${o.description?`<div class="iopt-desc">${esc(o.description)}</div>`:''}
                 </div>`;
      }
      html += '</div>';
    }
    html += `<div class="iopt-hint">…или напиши свой ответ в поле ниже ↓</div>`;
    el.innerHTML = html;
    chat.appendChild(el); scrollDown();
    el.querySelectorAll('[data-btn]').forEach(b => b.onclick = () => send(b.dataset.btn, true));
    return;
  }
  // Permission prompt (allow / deny).
  const shortLabel = s => s.length>60 ? s.slice(0,60)+'…' : s;
  const opts = (data.options||[]).map(o => {
    const cls = o.always ? 'allow' : (o.kind==='allow'?'allow':(o.kind==='deny'?'deny':''));
    return `<div class="iopt ${cls}" data-btn="${esc(o.label)}">${esc(shortLabel(o.label))}</div>`;
  }).join('');
  const head = data.title ? esc(data.title) : '⚙ Разрешить действие?';
  el.innerHTML =
    `<div class="ihead perm">⚙ ${head}</div>
     ${data.prompt?`<div class="ibody">${esc(data.prompt.slice(0,600))}</div>`:''}
     <div class="iopts">${opts}</div>`;
  chat.appendChild(el); scrollDown();
  el.querySelectorAll('[data-btn]').forEach(b => b.onclick = () => send(b.dataset.btn, false));
}

// ── disk session flow (fallback / history) ─────────────────────────
async function openWindow(w) {
  S.view='sessions'; S.currentWindow=w;
  titleEl.textContent=w.workspace_name||w.workspace_path;
  backBtn.style.display='inline-block';
  backBtn.onclick=()=>{ renderHome(); };
  footer.classList.remove('visible');
  main.innerHTML='<div class="empty">загрузка…</div>';
  try {
    const sessions = await api(`/api/projects/sessions?path=${encodeURIComponent(w.workspace_path)}`);
    const rows = sessions.map(s=>{
      const d=new Date(s.mtime*1000), mins=Math.floor((Date.now()-d)/60000);
      const t = mins<1?'только что':mins<60?`${mins} мин`:mins<1440?`${Math.floor(mins/60)} ч`:`${Math.floor(mins/1440)} дн`;
      return `<div class="session-row" data-id="${s.id}" data-title="${esc(s.title)}">
        <div class="title">${s.live?'● ':''}${esc(s.title)}</div>
        <div class="meta">${s.turns} ходов · ${t} назад</div></div>`;
    }).join('');
    main.innerHTML = `<div class="new-btn" id="new">➕ Новая сессия</div>${rows||'<div class="empty">Нет сессий.</div>'}`;
    main.querySelectorAll('.session-row').forEach(el=>el.onclick=()=>openDiskSession(el.dataset.id, el.dataset.title));
    $('new').onclick=newDiskSession;
  } catch(e){ main.innerHTML=`<div class="empty">Ошибка: ${esc(e.message)}</div>`; }
}
async function newDiskSession(){
  try{ const s=await api('/api/sessions/new',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({workspace_path:S.currentWindow.workspace_path})}); enterDiskChat(s.id,'',[]);
  }catch(e){ alert('Ошибка: '+e.message); }
}
async function openDiskSession(id,title){
  try{
    const [r,h]=await Promise.all([
      api('/api/sessions/resume',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({workspace_path:S.currentWindow.workspace_path,session_id:id,title})}),
      api(`/api/sessions/${id}/history?path=${encodeURIComponent(S.currentWindow.workspace_path)}`)]);
    enterDiskChat(r.id,title,h.history);
  }catch(e){ alert('Ошибка: '+e.message); }
}
function enterDiskChat(sid,title,history){
  S.view='chat'; titleEl.textContent=title||'Новый чат';
  backBtn.onclick=()=>openWindow(S.currentWindow);
  footer.classList.add('visible');
  main.innerHTML='<div class="chat" id="chat"></div>';
  const chat=$('chat');
  for(const h of (history||[])) addMsg(chat,h.role,h.text);
  scrollDown();
  closeWs();
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}/ws/session/${sid}${wsKey()}`);
  S.ws=ws;
  ws.onmessage=ev=>{ const m=JSON.parse(ev.data);
    if(m.type==='assistant'){ removeThinking(); const t=(m.message?.content||[]).filter(b=>b.type==='text').map(b=>b.text).join(''); if(t)addMsg(chat,'assistant',t); }
    else if(m.type==='done'){ removeThinking(); setSending(false); }
    else if(m.type==='error'){ removeThinking(); addMsg(chat,'error','⚠ '+(m.text||'')); setSending(false); }
  };
  ws.onclose=()=>{ setSending(false); removeThinking(); };
}

// ── minimal, safe markdown → HTML (headings, bold/italic, code, lists) ──
// Everything user/model text is HTML-escaped before any tag is added, so this
// can't inject markup. Line-based so newlines render like VS Code, not raw.
function renderMd(src){
  const escHtml = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const inline = s => {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, (m,c)=>'<code class="md-code">'+c+'</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  };
  // GFM table helpers: split "| a | b |" into cells, detect the "|---|:--:|" rule
  // row, and read per-column alignment from the colons in that rule.
  const parseRow = s => s.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
  const isSep = s => { const c=parseRow(s); return c.length>0 && c.every(x=>/^:?-{1,}:?$/.test(x)); };
  const alignOf = c => { const L=c.startsWith(':'), R=c.endsWith(':'); return L&&R?'center':R?'right':L?'left':''; };
  const lines = String(src||'').replace(/\r/g,'').split('\n');
  let html='', i=0, inCode=false, code='', para=[];
  const flushPara=()=>{ if(para.length){ html+='<div class="md-p">'+para.map(inline).join('<br>')+'</div>'; para=[]; } };
  while(i<lines.length){
    const ln=lines[i];
    if(/^```/.test(ln)){
      if(!inCode){ flushPara(); inCode=true; code=''; }
      else { html+='<pre class="md-pre"><code>'+escHtml(code.replace(/\n$/,''))+'</code></pre>'; inCode=false; }
      i++; continue;
    }
    if(inCode){ code+=ln+'\n'; i++; continue; }
    let m;
    if((m=ln.match(/^(#{1,6})\s+(.+)$/))){ flushPara(); html+='<div class="md-h">'+inline(m[2])+'</div>'; i++; continue; }
    if((m=ln.match(/^\s*[-*+]\s+(.+)$/))){ flushPara(); html+='<div class="md-li">• '+inline(m[1])+'</div>'; i++; continue; }
    if((m=ln.match(/^\s*(\d+)[.)]\s+(.+)$/))){ flushPara(); html+='<div class="md-li">'+m[1]+'. '+inline(m[2])+'</div>'; i++; continue; }
    if(/^\s*(---+|___+|\*\*\*+)\s*$/.test(ln)){ flushPara(); html+='<hr class="md-hr">'; i++; continue; }
    if(ln.trim()===''){ flushPara(); i++; continue; }
    // GFM table: a header row that has a "|" and whose NEXT line is a "---" rule.
    if(ln.indexOf('|')>=0 && i+1<lines.length && isSep(lines[i+1])){
      flushPara();
      const header=parseRow(ln), aligns=parseRow(lines[i+1]).map(alignOf), cols=header.length;
      i+=2; const rows=[];
      while(i<lines.length && lines[i].trim()!=='' && lines[i].indexOf('|')>=0){ rows.push(parseRow(lines[i])); i++; }
      const cell=(txt,tag,al)=>'<'+tag+(al?' style="text-align:'+al+'"':'')+'>'+inline(txt||'')+'</'+tag+'>';
      let t='<div class="md-tablewrap"><span class="tbl-expand">⤢ во весь экран</span><table class="md-table"><thead><tr>';
      for(let k=0;k<cols;k++) t+=cell(header[k],'th',aligns[k]);
      t+='</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'; for(let k=0;k<cols;k++) t+=cell(r[k],'td',aligns[k]); t+='</tr>'; }
      html+=t+'</tbody></table></div>'; continue;
    }
    para.push(ln); i++;
  }
  if(inCode) html+='<pre class="md-pre"><code>'+escHtml(code.replace(/\n$/,''))+'</code></pre>';
  flushPara();
  return html;
}

// ── shared chat helpers ────────────────────────────────────────────
function addMsg(chat,role,text){
  const el=document.createElement('div'); el.className='msg '+role;
  // Render Claude's replies as markdown (bold, code, headings, lists) like VS
  // Code; keep user/error messages as plain text.
  if(role==='assistant'){ el.classList.add('md'); el.innerHTML=renderMd(text); chat.appendChild(el); scrollDown(); return el; }
  if(role==='user'){
    // On history reload a sent image is just its upload path in the text — turn
    // those back into pictures so they show like when they were sent.
    const re=/[A-Za-z]:[\\\/][^\s"']*?claudebridge-uploads[\\\/][^\s"']+?\.(?:png|jpe?g|gif|webp|bmp)/gi;
    const matches = text.match(re) || [];
    if(matches.length){
      const names = matches.map(p=>p.split(/[\\\/]/).pop());
      let clean=text; for(const p of matches) clean=clean.split(p).join('');
      clean=clean.replace(/Прикреплённые файлы[^:]*:/,'').replace(/[ \t]+/g,' ').replace(/\n{2,}/g,'\n').trim();
      if(clean){ el.textContent=clean; chat.appendChild(el); }
      addImages(chat, names.map(n=>'/api/uploaded/'+encodeURIComponent(n)+wsKey()));
      scrollDown(); return el;
    }
  }
  el.textContent=text;
  chat.appendChild(el); scrollDown(); return el;
}
function addThinking(){ removeThinking(); const chat=$('chat'); if(!chat)return;
  const el=document.createElement('div'); el.className='thinking'; el.id='thinking';
  // Show the CONCRETE current action (the running tool) when we know it, not just
  // a generic "думает" — so the phone mirrors what VS Code shows Claude doing.
  el.innerHTML='<span class="dot"></span>'+(S.lastAction ? esc(S.lastAction) : 'Claude работает…');
  chat.appendChild(el); scrollDown(); }
function removeThinking(){ const t=$('thinking'); if(t)t.remove(); }
function setSending(on){ sendBtn.disabled=on; sendBtn.textContent=on?'…':'▶'; }
// Sticky auto-scroll: follow new messages ONLY while the user is already near
// the bottom. If they scrolled up to read, live updates must NOT yank them down
// (that was the "chat jumps to the end when I scroll a bit" bug). `force` (chat
// open / send) always jumps to the end.
let _stick=true, _touchScroll=false;
function recomputeStick(){ _stick = (main.scrollHeight - main.scrollTop - main.clientHeight) < 140; }
main.addEventListener('scroll', recomputeStick, {passive:true});
// While a finger is dragging the chat, NEVER auto-scroll. On some mobile browsers
// scroll events are deferred until release, so a message streaming in mid-drag
// would queue a jump that fires the instant you lift off ("scroll up, release →
// snaps to the end"). Recompute stickiness from the final resting position on
// release; momentum afterwards keeps it fresh via the scroll listener.
main.addEventListener('touchstart', ()=>{ _touchScroll=true; }, {passive:true});
main.addEventListener('touchend',   ()=>{ _touchScroll=false; recomputeStick(); }, {passive:true});
main.addEventListener('touchcancel',()=>{ _touchScroll=false; recomputeStick(); }, {passive:true});
function scrollDown(force){ if(force){ main.scrollTop=main.scrollHeight; return; } if(_stick && !_touchScroll) main.scrollTop=main.scrollHeight; }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function openLightbox(src){
  const lb=document.createElement('div'); lb.className='lightbox';
  const im=document.createElement('img'); im.src=src; lb.appendChild(im);
  const x=document.createElement('span'); x.className='lb-close'; x.textContent='×'; lb.appendChild(x);
  lb.onclick=()=> lb.remove();
  document.body.appendChild(lb);
}
function addImages(chat, srcs){
  if(!srcs.length) return;
  const row=document.createElement('div'); row.className='msg-imgs';
  for(const s of srcs){ const im=document.createElement('img'); im.src=s; im.onclick=()=>openLightbox(s); row.appendChild(im); }
  chat.appendChild(row); scrollDown();
}
function closeWs(){ if(S.ws){ try{S.ws.close();}catch{} S.ws=null; } }

// ── attachments ────────────────────────────────────────────────────
let attached = [];  // File objects
const attachBtn=$('attach'), fileInput=$('fileInput'), chipsEl=$('chips');
attachBtn.onclick=()=> fileInput.click();
fileInput.onchange=()=>{
  for(const f of fileInput.files){ if(attached.length<10) attached.push(f); }
  fileInput.value=''; renderChips();
  if(attached.length>=10) alert('Максимум 10 файлов');
};
function renderChips(){
  chipsEl.innerHTML='';
  attached.forEach((f,i)=>{
    const c=document.createElement('span'); c.className='chip';
    if(f.type.startsWith('image/')){ const src=URL.createObjectURL(f); const im=document.createElement('img'); im.src=src; im.onclick=(ev)=>{ ev.stopPropagation(); openLightbox(src); }; c.appendChild(im); }
    const nm=document.createElement('span'); nm.textContent=f.name; c.appendChild(nm);
    const x=document.createElement('b'); x.textContent='×'; x.onclick=()=>{ attached.splice(i,1); renderChips(); }; c.appendChild(x);
    chipsEl.appendChild(c);
  });
}
async function uploadAttached(){
  if(!attached.length) return [];
  const fd=new FormData();
  for(const f of attached) fd.append('files', f);
  const r=await fetch('/api/upload',{method:'POST',headers:{'x-bridge-key':S.key},body:fd});
  if(!r.ok) throw new Error('upload '+r.status);
  return (await r.json()).files.map(x=>x.path);
}

// ── voice (Web Speech API, live transcription, auto-restart) ───────
let recog=null, recognizing=false, manualStop=false;
const micBtn=$('mic');
micBtn.onclick=()=>{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Голосовой ввод не поддерживается этим браузером. Открой в Chrome.'); return; }
  if(recognizing){ manualStop=true; recog.stop(); return; }
  manualStop=false;
  startRecog(SR);
};
function startRecog(SR){
  recog=new SR(); recog.lang='ru-RU'; recog.interimResults=true;
  recog.continuous=true;  // keep mic open through short pauses
  // Text already in the field before THIS listening session; the new speech is
  // appended after it. On restart the base includes what was captured so far.
  const sessionBase = input.value ? input.value.replace(/\s+$/,'')+' ' : '';
  recog.onstart=()=>{ recognizing=true; micBtn.classList.add('rec'); };
  recog.onresult=e=>{
    // Take ONLY the last result — Android emits growing prefixes as separate
    // results, so the last one already holds the full current transcript.
    const last=e.results[e.results.length-1];
    input.value = sessionBase + last[0].transcript; autoGrow();
  };
  recog.onerror=ev=>{
    if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){ manualStop=true; alert('Нет доступа к микрофону'); }
    if(ev.error==='no-speech'){ /* let onend auto-restart */ }
  };
  recog.onend=()=>{
    recognizing=false;
    input.value = input.value.replace(/\s+$/,'');
    if(manualStop){ micBtn.classList.remove('rec'); return; }
    startRecog(SR);  // keep listening after a pause; tap mic to stop
  };
  recog.start();
}

// ── outbox: durable send queue ─────────────────────────────────────
// A message is kept (per-tab, in localStorage) until the server acks it. If the
// tunnel drops mid-send, the frame is silently lost — so we resend the whole
// queue on every (re)connect. The server dedupes by cid, so a resend of an
// already-injected message is a no-op. This is the "cache that holds the task
// through a connection drop until it's delivered".
function outboxKey(){ return 'cb-outbox:'+(S.cdpTarget||''); }
function loadOutbox(){ try{ return JSON.parse(localStorage.getItem(outboxKey())||'[]'); }catch(e){ return []; } }
function saveOutbox(q){ try{ localStorage.setItem(outboxKey(), JSON.stringify(q)); }catch(e){} }
function outboxAdd(it){ const q=loadOutbox(); q.push(it); saveOutbox(q); }
function outboxRemove(cid){ saveOutbox(loadOutbox().filter(x=>x.cid!==cid)); }
function markBubble(cid, state){
  const el=document.querySelector('.msg.user[data-cid="'+cid+'"]'); if(!el) return;
  el.classList.toggle('pending', state==='pending');
  el.classList.toggle('undelivered', state==='undelivered');
}
function flushOutbox(){
  if(!S.ws || S.ws.readyState!==1) return;
  for(const it of loadOutbox()){
    try{ S.ws.send(JSON.stringify(Object.assign({type:'send'}, it.payload, {cid:it.cid}))); markBubble(it.cid,'pending'); }catch(e){}
  }
}
// Re-draw still-undelivered messages as pending bubbles when (re)entering a chat
// (their DOM was thrown away, but the queue survived).
function renderOutboxPending(chat){
  for(const it of loadOutbox()){
    if(chat.querySelector('.msg.user[data-cid="'+it.cid+'"]')) continue;
    const t=(it.payload&&it.payload.text)||'';
    const disp=t.startsWith('Прикреплённые файлы')?'📎 вложения':t;
    const b=addMsg(chat,'user',disp); if(b){ b.dataset.cid=it.cid; b.classList.add('pending'); }
  }
}
function newCid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── send (text + attachments) ──────────────────────────────────────
sendBtn.onclick=async ()=>{
  _stick = true;   // when you send, follow the conversation to the end
  S.lastAction = '';   // new turn — reset the "current action" label
  const text=input.value.trim();
  if(!text && !attached.length) return;
  if(recognizing) recog.stop();
  // Keep preview URLs of image attachments to show in the chat after sending.
  const imgPreviews = attached.filter(f=>f.type.startsWith('image/')).map(f=>URL.createObjectURL(f));
  const attachedTypes = attached.map(f=>f.type);
  let paths=[];
  if(attached.length){
    setSending(true);
    try{ paths=await uploadAttached(); }
    catch(err){ alert('Ошибка загрузки файлов: '+err.message); setSending(false); return; }
    setSending(false);
  }
  // Images: sent both as paths-in-text (reliable — Claude reads them) and as an
  // images[] list for a best-effort visual paste into the VS Code input.
  const imgPaths = paths.filter((p,i)=> attachedTypes[i] && attachedTypes[i].startsWith('image/'));
  let finalText=text;
  if(paths.length){
    finalText='Прикреплённые файлы (посмотри их):\n'+paths.join('\n')+(text?'\n\n'+text:'');
  }
  const chat=$('chat');
  const queued = (S.view==='cdpchat' && S.cdpTarget);  // only cdp chats ack by cid
  // Disk-session fallback: old direct send (that server doesn't ack by cid).
  if(!queued){
    if(!S.ws || S.ws.readyState!==1){ alert('Нет связи с чатом — попробуй ещё раз.'); return; }
    S.ws.send(JSON.stringify({type:'send', text:finalText}));
    input.value=''; attached=[]; renderChips(); autoGrow();
    if(chat){ if(text) addMsg(chat,'user',text); else if(paths.length) addMsg(chat,'user','📎 '+paths.length+' файл(ов)'); addImages(chat,imgPreviews); addThinking(); }
    return;
  }
  const payload={text:finalText};
  if(imgPaths.length) payload.images=imgPaths;
  const cid=newCid();
  // Render the bubble now, clear the input immediately — the text is safe in the
  // queue even before it's delivered, so it can never be lost/"reset".
  let bubble=null;
  if(chat){
    if(text) bubble=addMsg(chat,'user',text);
    else if(paths.length) bubble=addMsg(chat,'user','📎 '+paths.length+' файл(ов)');
    if(bubble) bubble.dataset.cid=cid;
    addImages(chat, imgPreviews);
    addThinking();
  }
  input.value=''; attached=[]; renderChips(); autoGrow();
  outboxAdd({cid, payload, ts:Date.now()});
  if(S.ws && S.ws.readyState===1){
    try{ S.ws.send(JSON.stringify(Object.assign({type:'send'}, payload, {cid}))); markBubble(cid,'pending'); }catch(e){ markBubble(cid,'undelivered'); }
  } else {
    markBubble(cid,'undelivered');
    connectCdpWs();  // kick a reconnect → flush queue on open
  }
};
input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendBtn.click(); } });
// Auto-grow the input with the text (multi-line, easy to read), capped by the
// CSS max-height (180px) after which it scrolls.
function autoGrow(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,180)+'px'; }
input.addEventListener('input', autoGrow);

// Swipe, anywhere on screen:
//   In a chat  → (L→R) slides the tabs menu (drawer) OVER the chat; ← (R→L) hides it.
//   On home    ← (R→L) opens the active chat (forward), → back (in sub-views).
// Everything follows the finger; release past the threshold commits.
let sbX=0, sbY=0, sbActive=false, sbLocked=false, sbDx=0, sbMode='';
const canBack = () => backBtn.style.display!=='none' && typeof backBtn.onclick==='function';
const activeTabObj = () => S.cdpTabs.find(t => t.target_id===S.activeTab);
const canFwd = () => S.view==='home' && !!activeTabObj();
const isDrawerOpen = () => $('drawer').classList.contains('open');
function sbSnap(){
  document.body.style.transition='transform .24s cubic-bezier(.22,.61,.36,1)';
  document.body.style.transform='';
  setTimeout(()=>{ document.body.style.transition=''; }, 250);
}
$('drawerBack').addEventListener('click', closeDrawer);
// Keep the app clamped to the VISIBLE area when the on-screen keyboard opens, so
// the top header is never pushed off-screen. interactive-widget=resizes-content
// (viewport meta) already handles Chrome/Android — there the LAYOUT viewport
// shrinks with the keyboard, so window.innerHeight ≈ visualViewport.height and we
// leave 100dvh alone. iOS Safari ignores that directive (layout stays full, only
// the VISUAL viewport shrinks), so there we override the height with the visual
// viewport. Only a height var — never body.transform (the swipe-back owns that).
if (window.visualViewport) {
  const vv = window.visualViewport;
  const fitVV = () => {
    const kb = window.innerHeight - vv.height;   // keyboard overlap (0 when resized)
    if (kb > 120) document.documentElement.style.setProperty('--app-h', Math.round(vv.height) + 'px');
    else document.documentElement.style.removeProperty('--app-h');
  };
  vv.addEventListener('resize', fitVV);
  vv.addEventListener('scroll', fitVV);
  fitVV();
}

// Kill pinch-zoom / double-tap-zoom of the whole page (iOS ignores the viewport
// user-scalable=no, so block the gestures directly).
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
let _lastTouchEnd=0;
document.addEventListener('touchend', e=>{
  const now=Date.now();
  if(now-_lastTouchEnd<300) e.preventDefault();  // double-tap zoom
  _lastTouchEnd=now;
}, {passive:false});
document.addEventListener('touchstart', e=>{
  if(e.touches.length!==1){ sbActive=false; return; }
  const t=e.touches[0]; sbX=t.clientX; sbY=t.clientY; sbDx=0; sbLocked=false; sbMode='';
  sbActive=true;
}, {passive:true});
document.addEventListener('touchmove', e=>{
  if(!sbActive) return;
  const t=e.touches[0], dx=t.clientX-sbX, dy=t.clientY-sbY;
  if(!sbLocked){
    if(Math.abs(dx)<7 && Math.abs(dy)<7) return;
    if(Math.abs(dy) > Math.abs(dx)*1.3){ sbActive=false; return; }  // vertical = scroll
    if(S.view==='cdpchat'){
      drawerW = $('drawer').getBoundingClientRect().width;
      if(isDrawerOpen() && dx<0){ sbMode='drawer-close'; }
      else if(!isDrawerOpen() && dx>0){ sbMode='drawer-open'; renderDrawer(); }
      else { sbActive=false; return; }
    } else {
      if(dx>0 && canBack()) sbMode='back';
      else if(dx<0 && canFwd()) sbMode='fwd';
      else { sbActive=false; return; }
      document.body.style.transition='';
    }
    sbLocked=true;
  }
  e.preventDefault();
  if(sbMode==='drawer-open'){ sbDx=Math.max(0,Math.min(drawerW,dx)); setDrawerX(-drawerW+sbDx); }
  else if(sbMode==='drawer-close'){ sbDx=Math.max(-drawerW,Math.min(0,dx)); setDrawerX(sbDx); }
  else { sbDx = sbMode==='back' ? Math.max(0,dx) : Math.min(0,dx); document.body.style.transform='translateX('+sbDx+'px)'; }
}, {passive:false});
document.addEventListener('touchend', ()=>{
  if(!sbActive) return;
  sbActive=false;
  if(sbLocked) window.__swipeAt=Date.now();  // suppress the trailing card click
  const TH = Math.min(55, (drawerW||300)*0.22);
  if(sbMode==='drawer-open'){ (sbDx>TH ? openDrawer : closeDrawer)(); }
  else if(sbMode==='drawer-close'){ (-sbDx>TH ? closeDrawer : openDrawer)(); }
  else if(sbMode==='back' && sbDx>55){ backBtn.onclick(); document.body.style.transform='translateX('+Math.max(sbDx,80)+'px)'; requestAnimationFrame(sbSnap); }
  else if(sbMode==='fwd' && -sbDx>55){ const t=activeTabObj(); if(t) openCdpTab(t); document.body.style.transform='translateX('+Math.min(sbDx,-80)+'px)'; requestAnimationFrame(sbSnap); }
  else if(sbMode==='back' || sbMode==='fwd'){ sbSnap(); }
  sbDx=0; sbLocked=false; sbMode='';
}, {passive:true});

// ── PWA install + push notifications ───────────────────────────────
const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;
let deferredPrompt=null;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; if(!isStandalone()) showInstallBanner(); });
window.addEventListener('appinstalled', ()=>{ hideInstallBanner(); deferredPrompt=null; });

function hideInstallBanner(){ const b=$('installbar'); if(b) b.remove(); }
function showInstallBanner(){
  if(isStandalone() || $('installbar') || localStorage.getItem('installDismissed')) return;
  const bar=document.createElement('div'); bar.id='installbar'; bar.className='install-bar';
  bar.innerHTML='<span>📲 Установить ClaudeBridge на телефон</span><button id="ibyes">Установить</button><button id="ibno" class="ib-x">×</button>';
  document.body.appendChild(bar);
  $('ibyes').onclick=async()=>{
    if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; hideInstallBanner(); }
    else { alert('Открой меню браузера (⋮ или «Поделиться») → «Установить приложение» / «На экран Домой».'); }
  };
  $('ibno').onclick=()=>{ localStorage.setItem('installDismissed','1'); hideInstallBanner(); };
}
// If not installed and no native prompt fired (iOS / some browsers), still nudge.
setTimeout(()=>{
  if(isStandalone() || $('installbar') || deferredPrompt || localStorage.getItem('installDismissed')) return;
  const bar=document.createElement('div'); bar.id='installbar'; bar.className='install-bar';
  bar.innerHTML='<span>📲 Установить: меню браузера → «На экран Домой»</span><button id="ibno" class="ib-x">×</button>';
  document.body.appendChild(bar);
  $('ibno').onclick=()=>{ localStorage.setItem('installDismissed','1'); hideInstallBanner(); };
}, 4000);

function urlB64ToUint8(s){ const pad='='.repeat((4-s.length%4)%4); const b=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/')); return Uint8Array.from([...b].map(c=>c.charCodeAt(0))); }
// Push is ON by default. `pushOff` in localStorage means the user turned it off.
function pushIsOn(){ return ('Notification' in window) && Notification.permission==='granted' && localStorage.getItem('pushOff')!=='1'; }
async function enablePush(silent){
  try{
    if(!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)){
      if(!silent) alert('Этот браузер не поддерживает пуш. Установи приложение на экран Домой.'); return; }
    localStorage.removeItem('pushOff');
    let perm=Notification.permission;
    if(perm==='default') perm=await Notification.requestPermission();
    if(perm!=='granted'){ if(!silent) alert('Уведомления отклонены. Разреши их в настройках браузера.'); return; }
    const reg=await navigator.serviceWorker.ready;
    const {publicKey}=await api('/api/push/key');
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(publicKey)});
    await api('/api/push/subscribe',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(sub)});
    if(!silent){
      try{ await api('/api/push/test',{method:'POST'}); }catch(_){}
      alert('Уведомления включены ✅  Сейчас придёт проверочный пуш.');
    }
  }catch(e){ if(!silent) alert('Не удалось включить уведомления: '+e.message); }
}
async function disablePush(){
  try{
    localStorage.setItem('pushOff','1');
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub) await sub.unsubscribe();
    alert('Уведомления выключены.');
  }catch(e){ alert('Ошибка: '+e.message); }
}
function togglePush(){ if(pushIsOn()) disablePush(); else enablePush(false); }
// Auto-enable on load unless the user explicitly turned it off.
async function autoPush(){
  if(localStorage.getItem('pushOff')==='1') return;
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||!('Notification' in window)) return;
  if(Notification.permission==='denied') return;
  try{ await enablePush(true); }catch(e){}
}

// Clear the app-icon badge and dismiss lingering notifications whenever the app
// is opened/focused — otherwise requireInteraction notifications pile up (the
// icon badge kept climbing and never dropped).
function clearBadges(){
  try{ if(navigator.clearAppBadge) navigator.clearAppBadge(); }catch(e){}
  try{
    if(navigator.serviceWorker) navigator.serviceWorker.ready
      .then(reg=>reg.getNotifications().then(ns=>ns.forEach(n=>n.close()))).catch(()=>{});
  }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden) return;
  clearBadges();
  // Mobile freezes timers while backgrounded, so the heartbeat can't detect a
  // dead socket. On return, verify liveness immediately: reconnect now if the
  // socket is gone, else ping to force a fast drop-check.
  if(S.view==='cdpchat' && S.cdpTarget){
    if(!S.ws || S.ws.readyState!==1){ S.reconnectDelay=800; connectCdpWs(); }
    else { try{ S.ws.send(JSON.stringify({type:'ping'})); }catch(e){} }
  }
});
window.addEventListener('focus', clearBadges);

// Stash the auth key where the service worker can read it, so answering from a
// push notification works even when the app isn't open.
function cacheKeyForSW(){
  try{ if('caches' in window && S.key)
    caches.open('cb-key').then(c=>c.put('/__key', new Response(S.key))).catch(()=>{}); }catch(e){}
}

// Fullscreen table viewer: tap any rendered table to open it big, scroll both
// axes, and A−/A+ to change font size (pinch-zoom is disabled page-wide, so this
// is how you read a wide table comfortably on a phone).
function initTableFs(){
  if(document.getElementById('tblFs')) return;
  const o=document.createElement('div'); o.id='tblFs';
  o.innerHTML='<div class="fsbar"><button class="x" title="Закрыть">✕</button>'
    +'<div class="ttl">Таблица</div>'
    +'<button data-z="-1" title="Меньше">A−</button>'
    +'<button data-z="1" title="Больше">A+</button></div><div class="fsbody"></div>';
  document.body.appendChild(o);
  const body=o.querySelector('.fsbody'); let fs=15;
  const setFs=v=>{ fs=Math.max(9,Math.min(32,v)); body.style.setProperty('--fsfs',fs+'px'); };
  const close=()=>o.classList.remove('on');
  o.querySelector('.x').onclick=close;
  o.querySelectorAll('[data-z]').forEach(b=>b.onclick=()=>setFs(fs+(b.dataset.z==='1'?2:-2)));
  o.addEventListener('click',e=>{ if(e.target===o) close(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') close(); });
  // A tap on any rendered table opens it fullscreen. A horizontal swipe to scroll
  // the wrap moves the touch, so the browser suppresses the click — swipe ≠ open.
  document.addEventListener('click',e=>{
    const w=e.target.closest && e.target.closest('.md-tablewrap'); if(!w) return;
    const tbl=w.querySelector('table'); if(!tbl) return;
    body.innerHTML='<table>'+tbl.innerHTML+'</table>'; setFs(15); o.classList.add('on');
  });
}

loadHome();
autoPush();
initTableFs();
clearBadges();
cacheKeyForSW();
setInterval(()=>{ if(S.view==='home' || S.drawerOpen) loadHome(); }, 3000);
</script>
