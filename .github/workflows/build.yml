name: build

# Tag a commit `vX.Y.Z` (matching bridge/version.py) to build both platforms
# and attach the binaries to a GitHub Release — that's what the app updates from.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: ClaudeBridge-windows.exe
          - os: macos-latest
            asset: ClaudeBridge-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --noconfirm --onefile --windowed --name ClaudeBridge
          --add-data "web;web"
          --collect-submodules bridge --collect-submodules uvicorn
          --collect-all pywebpush --collect-all py_vapid --collect-all http_ece
          --hidden-import win32gui --hidden-import win32process --hidden-import psutil --hidden-import qrcode
          launcher_gui.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --noconfirm --onefile --windowed --name ClaudeBridge
          --add-data "web:web"
          --collect-submodules bridge --collect-submodules uvicorn
          --collect-all pywebpush --collect-all py_vapid --collect-all http_ece
          --hidden-import qrcode
          launcher_gui.py

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item dist/ClaudeBridge.exe ${{ matrix.asset }}

      - name: Stage artifact (macOS)
        if: runner.os == 'macOS'
        run: cp dist/ClaudeBridge ${{ matrix.asset }}

      - name: Publish to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
